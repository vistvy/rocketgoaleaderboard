<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Goal.io Ranked Leaderboards</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#000;
  color:white;
  padding:20px;
}

/* TOP RIGHT LOGIN (smaller + cleaner) */
.login-box{
  position:fixed;
  top:10px;
  right:10px;
  display:flex;
  gap:6px;
  align-items:center;
  z-index:999;
}

.login-box input{
  width:110px;
  padding:5px 7px;
  font-size:11px;
  border:none;
  border-radius:6px;
  background:#111;
  color:white;
}

.login-box button{
  padding:5px 8px;
  font-size:11px;
  border:none;
  border-radius:6px;
  background:#0ea5e9;
  color:white;
  cursor:pointer;
}

/* MAIN */
.container{
  max-width:1100px;
  margin:auto;
  padding-top:40px;
}

h1{
  text-align:center;
  color:#38bdf8;
  margin-bottom:25px;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.tabs button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.tabs button.active{
  background:#0ea5e9;
}

.board{display:none;}
.board.active{display:block;}

.table-box{
  background:#0a0a0a;
  border-radius:18px;
  padding:18px;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}

h2{
  text-align:center;
  color:#38bdf8;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#111;
  padding:12px;
}

.table td{
  background:#0f0f0f;
  padding:10px;
  text-align:center;
}

.table tr:nth-child(even) td{
  background:#151515;
}

.top1{color:gold;font-weight:bold;}
.top2{color:silver;font-weight:bold;}
.top3{color:#cd7f32;font-weight:bold;}

.admin-box{
  display:none;
  margin-top:20px;
  background:#0a0a0a;
  border-radius:15px;
  padding:15px;
}

input,select{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:4px;
  background:#111;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

.action-btn{
  padding:6px 10px;
  font-size:12px;
}

.note{
  text-align:center;
  margin-top:15px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- LOGIN TOP RIGHT -->
<div class="login-box">
  <input type="password" id="password" placeholder="admin">
  <button onclick="login()">Login</button>
</div>

<div class="container">

<h1>🚀 Rocket Goal.io Ranked Leaderboards</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="showBoard('1v1', event)">1v1</button>
  <button class="tab-btn" onclick="showBoard('2v2', event)">2v2</button>
  <button class="tab-btn" onclick="showBoard('3v3', event)">3v3</button>
</div>

<div id="1v1" class="board active">
<div class="table-box">
<h2>1v1 Ranked</h2>
<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>MMR</th>
<th class="actions-header" style="display:none;">Actions</th>
</tr>
</thead>
<tbody id="board1v1"></tbody>
</table>
</div>
</div>

<div id="2v2" class="board">
<div class="table-box">
<h2>2v2 Ranked</h2>
<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>MMR</th>
<th class="actions-header" style="display:none;">Actions</th>
</tr>
</thead>
<tbody id="board2v2"></tbody>
</table>
</div>
</div>

<div id="3v3" class="board">
<div class="table-box">
<h2>3v3 Ranked</h2>
<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>MMR</th>
<th class="actions-header" style="display:none;">Actions</th>
</tr>
</thead>
<tbody id="board3v3"></tbody>
</table>
</div>
</div>

<div class="admin-box" id="adminBox">
<h2>Admin Panel</h2>

<select id="playlist">
<option value="1v1">1v1</option>
<option value="2v2">2v2</option>
<option value="3v3">3v3</option>
</select>

<input type="text" id="playerName" placeholder="Player Name">
<input type="number" id="playerMMR" placeholder="MMR">

<br><br>
<button onclick="addPlayer()">Add Player</button>
</div>

<p class="note">Live Firebase Leaderboards</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0EuuEkpVMjDcZ9-BSg27ioP5oZ866vqg",
  authDomain: "rglb-db9d1.firebaseapp.com",
  projectId: "rglb-db9d1",
  storageBucket: "rglb-db9d1.firebasestorage.app",
  messagingSenderId: "426022077306",
  appId: "1:426022077306:web:429414c324c21320674cc3",
  measurementId: "G-88T9T321RQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardRef = collection(db,"leaderboard");

const ADMIN_PASSWORD = "RGLB-ADMIN38457";
let admin = false;

window.login = function(){
  const password = document.getElementById("password").value;

  if(password === ADMIN_PASSWORD){
    admin = true;
    document.getElementById("adminBox").style.display = "block";
    document.querySelectorAll(".actions-header").forEach(h=>h.style.display="table-cell");
  } else {
    alert("Wrong password");
  }
}

window.showBoard = function(mode,event){
  document.querySelectorAll(".board").forEach(b=>b.classList.remove("active"));
  document.getElementById(mode).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

window.addPlayer = async function(){
  if(!admin) return;

  const playlist = document.getElementById("playlist").value;
  const name = document.getElementById("playerName").value;
  const mmr = Number(document.getElementById("playerMMR").value);

  if(name && mmr>=0){
    await addDoc(leaderboardRef,{playlist,name,mmr});
  }
}

window.deletePlayer = async function(id){
  if(!admin) return;
  await deleteDoc(doc(db,"leaderboard",id));
}

window.editMMR = async function(id,currentMMR){
  if(!admin) return;
  const n = prompt("MMR",currentMMR);
  if(n!==null){
    await updateDoc(doc(db,"leaderboard",id),{mmr:Number(n)});
  }
}

onSnapshot(leaderboardRef,(snap)=>{
  const boards={"1v1":[],"2v2":[],"3v3":[]};

  snap.forEach(d=>{
    const x=d.data();
    boards[x.playlist].push({id:d.id,...x});
  });

  Object.keys(boards).forEach(mode=>{
    boards[mode].sort((a,b)=>b.mmr-a.mmr);
    const table=document.getElementById(`board${mode}`);
    table.innerHTML="";

    boards[mode].forEach((player,index)=>{

      let rankClass=index===0?"top1":index===1?"top2":index===2?"top3":"";

      if(admin){
        table.innerHTML+=`
        <tr>
          <td class="${rankClass}">#${index+1}</td>
          <td>${player.name}</td>
          <td>${player.mmr}</td>
          <td>
            <button class="action-btn" onclick="editMMR('${player.id}',${player.mmr})">Edit</button>
            <button class="action-btn" onclick="deletePlayer('${player.id}')">Remove</button>
          </td>
        </tr>`;
      } else {
        table.innerHTML+=`
        <tr>
          <td class="${rankClass}">#${index+1}</td>
          <td>${player.name}</td>
          <td>${player.mmr}</td>
        </tr>`;
      }
    });
  });
});

</script>

</body>
</html>
